<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>UAV Parking — London</title>
  <meta name="description" content="Live TfL car park availability across London. Real-time data from Transport for London.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.7) !important;
      color: rgba(255,255,255,0.25) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.25) !important; }
    .leaflet-control-zoom a {
      background: #1c1c1e !important;
      color: rgba(255,255,255,0.6) !important;
      border-color: rgba(255,255,255,0.08) !important;
    }
    .leaflet-control-zoom a:hover { background: #2c2c2e !important; color: #fff !important; }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">UAV<span> Parking</span></div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading live TfL data…</div>
</div>

<div id="toast"></div>

<div id="app">

  <header id="header">
    <div class="logo">
      <div class="logo-icon">P</div>
      <div class="logo-text">UAV Parking</div>
    </div>

    <div class="search-wrapper">
      <input
        id="searchInput"
        type="text"
        placeholder="Search car parks…"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="header-right">
      <div class="clock-time" id="clockTime">--:--</div>
      <button class="btn-locate" onclick="locateMe()">Near Me</button>
    </div>
  </header>

  <div id="main">

    <aside id="sidebar">
      <div class="drag-handle"></div>

      <div class="filter-bar">
        <div class="filter-pills">
          <div class="pill active-all" data-filter="all">All</div>
          <div class="pill" data-filter="available">Available</div>
          <div class="pill" data-filter="limited">Limited</div>
          <div class="pill" data-filter="full">Full</div>
        </div>
      </div>

      <div class="sidebar-meta">
        <div class="results-count"><strong id="resultsNum">—</strong> car parks</div>
        <select class="sort-select" id="sortSelect">
          <option value="name">A–Z</option>
          <option value="availability">Availability</option>
          <option value="distance">Distance</option>
        </select>
      </div>

      <div class="disclaimer">
        Live data from TfL Open Data. Occupancy is an estimate — always check on-site signage.
      </div>

      <div id="parkingList"></div>
    </aside>

    <div id="mapContainer">
      <div id="map"></div>

      <div class="map-overlay" id="mapLegend">
        <div class="legend-title">Spaces</div>
        <div class="legend-item"><div class="legend-dot free"></div><span>Available</span></div>
        <div class="legend-item"><div class="legend-dot limited"></div><span>Limited</span></div>
        <div class="legend-item"><div class="legend-dot full"></div><span>Full</span></div>
      </div>

      <div id="detailPanel">
        <div class="panel-empty">
          <div class="panel-empty-icon">P</div>
          <p>Select a car park</p>
        </div>
      </div>
    </div>

  </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle">🅿 View List</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
